name: Morgenrapport

on:
  schedule:
    # GitHub Actions kjører i UTC. Vi planlegger primær- og reserve-tidspunkt for
    # begge sesongene. Tidssone-vakten i src/main.py tillater timen og timen etter;
    # filbasert idempotens forhindrer dobbel utsending.
    - cron: "0 6 * * *"    # 08:00 Oslo sommer (CEST) – primær
    - cron: "30 6 * * *"   # 08:30 Oslo sommer – reserve ved forsinkelse
    - cron: "0 7 * * *"    # 08:00 Oslo vinter (CET) – primær
    - cron: "30 7 * * *"   # 08:30 Oslo vinter – reserve ved forsinkelse
  workflow_dispatch:       # gjør at du kan kjøre manuelt fra GitHub-fanen "Actions"

permissions:
  contents: write          # trengs for å publisere nettsiden (commit til docs/)

concurrency:
  group: morgenrapport
  cancel-in-progress: false

jobs:
  rapport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Generer og send rapport
        env:
          # Gmail-vei (når alle mottakere). Brukes hvis begge er satt:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Resend-vei (fallback hvis Gmail ikke er konfigurert):
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          # Manuell kjøring overstyrer tidssone-vakten:
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python -m src.main

      - name: Publiser nettsiden (commit docs/)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "Ingen endringer å publisere."
          else
            git commit -m "Morgenrapport $(date -u +%F)"
            git push
          fi
